<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      http-equiv="Content-Security-Policy"
      content="
        default-src 'self';
        script-src 'self' 'unsafe-inline' 'wasm-unsafe-eval';
        style-src 'self' 'unsafe-inline';
        font-src 'self' data:;
        img-src 'self' data: blob: https:;
        connect-src 'self' ws://localhost:* http://localhost:*;
        worker-src 'self' blob:
      "
    />
    <title>Ouroboros</title>
    <style>
      /* ── Startup splash ───────────────────────────────────────────────────── */
      #splash {
        position: fixed;
        inset: 0;
        z-index: 99999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 20px;
        background: transparent;
        color: #9898a8;
        font-family: 'Inter', system-ui, -apple-system, sans-serif;
        pointer-events: none;
        opacity: 1;
        transition: opacity 500ms ease;
      }

      #splash.splash-fade-out {
        opacity: 0;
      }

      #splash .splash-logo {
        width: 64px;
        height: 64px;
        object-fit: contain;
        filter: drop-shadow(0 0 24px rgba(88, 166, 255, 0.15));
        animation: splash-in 400ms ease forwards;
        opacity: 0;
      }

      #splash .splash-tagline {
        font-size: 11px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: #9898a8;
        animation: splash-in 300ms ease 120ms forwards;
        opacity: 0;
      }

      #splash .splash-bar {
        width: 48px;
        height: 2px;
        border-radius: 2px;
        background: rgba(88, 166, 255, 0.4);
        animation: splash-bar-grow 400ms ease 60ms forwards;
        transform-origin: left;
        transform: scaleX(0);
      }

      @keyframes splash-in {
        from { opacity: 0; transform: translateY(6px); }
        to   { opacity: 1; transform: translateY(0); }
      }

      @keyframes splash-bar-grow {
        from { transform: scaleX(0); }
        to   { transform: scaleX(1); }
      }
    </style>
  </head>
  <body>
    <!-- Splash screen — dismissed by index.tsx after React mounts -->
    <div id="splash" aria-hidden="true">
      <img class="splash-logo" src="OUROBOROS.png" alt="Ouroboros" draggable="false" />
      <div class="splash-bar"></div>
      <div class="splash-tagline">Loading…</div>
    </div>

    <div id="root"></div>
    <script type="module" src="./index.tsx"></script>
  </body>
</html>
