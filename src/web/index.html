<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Ouroboros IDE</title>
    <style>
      /* ── Startup splash ───────────────────────────────────────────────────── */
      #splash {
        position: fixed;
        inset: 0;
        z-index: 99999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 16px;
        background: #0d1117;
        color: #8b949e;
        font-family: system-ui, -apple-system, sans-serif;
        pointer-events: none;
        opacity: 1;
        transition: opacity 500ms ease;
      }

      #splash.splash-fade-out {
        opacity: 0;
      }

      #splash .splash-wordmark {
        font-size: 20px;
        font-weight: 600;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: #c9d1d9;
        animation: splash-in 300ms ease forwards;
        opacity: 0;
      }

      #splash .splash-tagline {
        font-size: 11px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: #58a6ff;
        animation: splash-in 300ms ease 80ms forwards;
        opacity: 0;
      }

      #splash .splash-bar {
        width: 48px;
        height: 2px;
        border-radius: 2px;
        background: #58a6ff;
        animation: splash-bar-grow 300ms ease 40ms forwards;
        transform-origin: left;
        transform: scaleX(0);
      }

      @keyframes splash-in {
        from { opacity: 0; transform: translateY(6px); }
        to   { opacity: 1; transform: translateY(0); }
      }

      @keyframes splash-bar-grow {
        from { transform: scaleX(0); }
        to   { transform: scaleX(1); }
      }
    </style>
    <!--
      Web preload shim (webPreload.js) is built separately as IIFE
      by vite.webpreload.config.ts and injected at serve time.
      It cannot be a Vite entry because it must run synchronously
      before React mounts to set up window.electronAPI.
    -->
  </head>
  <body>
    <!-- Splash screen — dismissed by index.tsx after React mounts -->
    <div id="splash" aria-hidden="true">
      <div class="splash-wordmark">Ouroboros</div>
      <div class="splash-bar"></div>
      <div class="splash-tagline">Loading...</div>
    </div>

    <div id="root"></div>
    <script type="module" src="../renderer/index.tsx"></script>
  </body>
</html>
