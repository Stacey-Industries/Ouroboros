name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Install better-sqlite3 for system Node (vitest needs Node ABI, not Electron ABI)
        run: |
          mkdir -p /tmp/Temp/sqlite-fresh
          cd /tmp/Temp/sqlite-fresh
          npm init -y
          npm install better-sqlite3

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test -- --reporter=verbose

      - name: Build
        run: npm run build
