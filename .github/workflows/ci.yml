name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  validate:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    # 35-min job budget: the test suite alone is ~17 min Windows-local and
    # CI runners are ~1.5–2× slower (~25–30 min). The previous 20-min cap
    # made the Test step's own timeout-minutes moot. Bumped 20 → 35.
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install native build prerequisites (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          # xvfb added for Pipeline Hardening M-4 — Electron needs a virtual display
          # for the chromium renderer when running headless on Linux CI.
          sudo apt-get install -y build-essential python3 libnss3 libatk-bridge2.0-0 libdrm2 libxkbcommon0 libgbm1 libasound2t64 xvfb || \
          sudo apt-get install -y build-essential python3 libnss3 libatk-bridge2.0-0 libdrm2 libxkbcommon0 libgbm1 libasound2 xvfb

      # --ignore-scripts skips the postinstall electron-rebuild + changelog steps.
      # The postinstall electron-rebuild hangs at "Searching dependency tree" on
      # all 3 platforms after the node-gyp@^11 override unblocked distutils. We
      # run electron-rebuild explicitly below so it can fail/succeed on its own
      # timer without taking the entire `npm ci` step with it, and so the
      # changelog script doesn't gate everything else either.
      - run: npm ci --ignore-scripts

      # --ignore-scripts above skips electron's postinstall (node install.js),
      # which downloads the Electron binary and writes node_modules/electron/path.txt.
      # Without path.txt, any test file that imports electron-log, electron-store,
      # or the electron package itself throws "Electron failed to install correctly".
      # Run the install script explicitly here, mirroring the pattern used for
      # electron-rebuild below.
      - name: Download Electron binary (postinstall replacement)
        run: node node_modules/electron/install.js

      - name: Generate changelog (postinstall replacement)
        run: node tools/build-changelog.js

      # Rebuild native modules against Electron's Node ABI on every platform.
      # Replaces the postinstall electron-rebuild that was timing out at 20min.
      # `-w better-sqlite3,node-pty` restricts to the two native deps we ship.
      #
      # Use --package=@electron/rebuild explicit to force resolution to the
      # maintained scoped package (v4+). The bare `electron-rebuild` binary
      # name on npm is also published by the deprecated unscoped package,
      # which has a `Searching dependency tree` hang on CI. The explicit
      # --package flag bypasses any binary-name collision in node_modules/.bin.
      - name: Rebuild native modules for Electron (all platforms)
        timeout-minutes: 15
        run: npx --package=@electron/rebuild electron-rebuild -f -w better-sqlite3,node-pty

      - name: Rebuild native modules (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: npm rebuild

      - name: Install better-sqlite3 for system Node (vitest needs Node ABI, not Electron ABI)
        if: matrix.os == 'ubuntu-latest'
        run: |
          mkdir -p /tmp/Temp/sqlite-fresh
          cd /tmp/Temp/sqlite-fresh
          npm init -y
          npm install better-sqlite3

      - name: Install better-sqlite3 for system Node (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $dir = "$env:LOCALAPPDATA\Temp\sqlite-fresh"
          New-Item -ItemType Directory -Force -Path $dir | Out-Null
          Set-Location $dir
          npm init -y
          npm install better-sqlite3

      - name: Install better-sqlite3 for system Node (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          mkdir -p /tmp/Temp/sqlite-fresh
          cd /tmp/Temp/sqlite-fresh
          npm init -y
          npm install better-sqlite3

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        # 25-min budget: full local Windows suite is ~17 min (measured
        # 2026-05-14, 1065 files / 10993 tests); CI Windows runners are
        # ~1.5–2× slower (~25–30 min). The previous 10-min cap was too
        # tight (tests stream through normally and hit the cap before
        # completing — no hang). Bumped 10 → 25.
        timeout-minutes: 25
        run: npm run test -- --reporter=verbose

      - name: Build (Electron)
        run: npm run build

      - name: Smoke-test web build (Ubuntu only)
        if: matrix.os == 'ubuntu-latest'
        run: npm run build:web

      # Pipeline Hardening M-4: Playwright Electron e2e (stable subset).
      # Ubuntu-only because (a) xvfb wrap keeps the CI step simple — no Windows
      # alternative needed since the renderer launches headlessly under xvfb,
      # (b) the meta-spec called out the Playwright + Electron wrinkle; this
      # closes it. Stable subset is 9 tests across 3 specs (app-launch,
      # basic-navigation, compare-providers, agent-chat). 6 specs are excluded
      # via testIgnore for known drift bugs (see
      # roadmap/follow-ups/2026-05-13-electron-e2e-spec-drift.md).
      # Install Playwright browser binaries before the e2e step.
      # The compare-providers spec launches a chromium context, which needs
      # both the full chromium browser and the chrome-headless-shell variant
      # Playwright ships separately in v1.40+. apt deps are already installed
      # in the "Install native build prerequisites (Ubuntu)" step above so
      # --with-deps would mostly no-op; keep it explicit but skip the apt run.
      - name: Install Playwright browsers (Ubuntu only)
        if: matrix.os == 'ubuntu-latest'
        run: npx playwright install chromium chromium-headless-shell

      # Electron's chrome-sandbox binary requires setuid-root to enable the
      # SUID sandbox. The unpacked binary from npm has the wrong ownership
      # on GH Actions runners; Electron refuses to launch with FATAL:
      # sandbox/linux/suid/client/setuid_sandbox_host.cc:166. Standard CI
      # fix: chown root and chmod 4755. (We do NOT use --no-sandbox because
      # the production app relies on the sandbox; this matches the
      # production launch path.)
      - name: Configure Electron chrome-sandbox setuid (Ubuntu only)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo chown root:root node_modules/electron/dist/chrome-sandbox
          sudo chmod 4755 node_modules/electron/dist/chrome-sandbox

      - name: Playwright e2e (Electron stable subset, Ubuntu only)
        if: matrix.os == 'ubuntu-latest'
        timeout-minutes: 10
        run: xvfb-run --auto-servernum npm run test:e2e

      - name: Upload Playwright report on failure
        if: failure() && matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.os }}
          path: |
            playwright-report/
            test-results/
          retention-days: 14
