name: Mutation Testing (Stryker)

on:
  pull_request:
  push:
    branches:
      - master
  schedule:
    # Full re-baseline every Monday at 04:17 UTC — off-cycle from common automation slots.
    - cron: '17 4 * * 1'

jobs:
  mutation-incremental:
    name: Mutation — incremental (PR + push to master)
    if: github.event_name == 'pull_request' || github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Install Electron binary
        run: node node_modules/electron/install.js

      # Incremental mode: mutates only files changed against the baseline.
      # On a fresh clone the baseline file (reports/stryker-incremental.json)
      # is absent — Stryker falls back to a full run for that invocation.
      - name: Run Stryker (incremental)
        run: npx stryker run --incremental

  mutation-full:
    name: Mutation — full (scheduled)
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Install Electron binary
        run: node node_modules/electron/install.js

      # Full run: --force bypasses the incremental baseline regardless of
      # whether the baseline file exists on disk. Keeps the weekly picture
      # accurate and rebuilds the baseline so Monday's PR incremental runs
      # start from a fresh foundation.
      - name: Run Stryker (full)
        run: npx stryker run --force
